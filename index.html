<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fire base</title>
    <style>

    </style>
   <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getFirestore,
      collection,
      addDoc
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCMXH1_3080pOo2qxokT4WEdbw72SHfs_E",
  		authDomain: "joao-barbosa.firebaseapp.com",
  		projectId: "joao-barbosa",
  		storageBucket: "joao-barbosa.firebasestorage.app",
  		messagingSenderId: "1084184181601",
  		appId: "1:1084184181601:web:e5d095a5c2f8bb70e26320"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const form = document.getElementById("formUsuario");
    const mensagem = document.getElementById("mensagem");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const cpf = document.getElementById("cpf").value;
      const nome = document.getElementById("nome").value;
      const email = document.getElementById("email").value;
      const telefone = document.getElementById("telefone").value;
      const senha = document.getElementById("senha").value;

      try {
        await addDoc(collection(db, "usuarios"), {
          cpf,
          nome,
          email,
          telefone,
          senha
        });

        mensagem.textContent = "Usuário salvo com sucesso.";
        mensagem.style.color = "green";
        form.reset();
      } catch (error) {
        mensagem.textContent = "Erro ao salvar: " + error.message;
        mensagem.style.color = "red";
      }
    });
  </script>
</head>
<body>
    <form id="formulario">
        <fieldset>
            <legend>Cadastro do firebase</legend>
            <p>Nome:</p><input type="text" id="nome" class="campo" placeholder="Digite seu nome" maxlength="100" minlength="" required><br>
            <p>Idade:</p><input type="text" id="idade" class="campo" placeholder="Digite sua idade" maxlength="3" minlength="" required><br>
            <p>Email:</p><input type="text" id="email" class="campo" placeholder="Digite seu email" maxlength="" minlength="" required><br>
            <p>CPF:</p><input type="text" id="cpf" class="campo" placeholder="Digite seu cpf" maxlength="11" minlength="11" required><br>
            <p>Senha:</p><input type="text" id="senha" class="campo" placeholder="Digite sua senha" maxlength="10" minlength="5" required><br>
            <p>Telefone:</p><input type="text" id="telefone" class="campo" placeholder="Digite seu telefone" maxlength="11" minlength="11" required><br>
            <p>CEP:</p><input type="text" id="cep" class="campo" placeholder="Digite seu cep" maxlength="12" minlength="10" required><br>
            <input type="submit" value="Cadastrar">
        </fieldset>
    </form>
</body>
</html>
